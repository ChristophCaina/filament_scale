name: ESPHome CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets.yaml
        run: |
          echo "wifi_ssid: 'dummy_ssid'" > secrets.yaml
          echo "wifi_password: 'dummy_password'" >> secrets.yaml
          echo "spoolman_ip: '127.0.0.1'" >> secrets.yaml
          echo "filaman_ip: '127.0.0.1'" >> secrets.yaml
          echo "mqtt_broker: '127.0.0.1'" >> secrets.yaml
          echo "api_encryption_key: 'MDEyMzQ1Njc4OTAxMjM0NQ=='" >> secrets.yaml
          echo "github_url: 'github://christophcaina/filament_scale/firmware/example_config.yaml'" >> secrets.yaml

      - name: Validate ESPHome Config
        run: esphome config firmware/test-all.yaml
