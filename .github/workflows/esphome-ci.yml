name: ESPHome CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets.yaml
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy_ssid'
          wifi_password: 'dummy_password'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          github_url: 'github://christophcaina/filament_scale/firmware/example_config.yaml'
          EOF

      - name: Validate ESPHome Config
        run: esphome config firmware/example_config.yaml

  build-release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome & jq
        run: |
          pip install esphome
          sudo apt-get update && sudo apt-get install jq -y

      - name: Extract Version from Manifest
        id: get_version
        run: |
          VERSION=$(jq -r '.version' installer/firmware-builds/manifest-scale.json)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected Version from manifest: $VERSION"

      - name: Create dummy secrets.yaml (Build)
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy'
          wifi_password: 'dummy123'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          github_url: 'github://${{ github.repository }}/firmware/example_config.yaml'
          EOF

      - name: Compile Firmware
        run: esphome compile firmware/example_config.yaml

      - name: Find and Prepare Binary
        shell: bash
        run: |
          REAL_BIN=$(find firmware/.esphome/build -name "firmware.bin" | head -n 1)
          if [ -z "$REAL_BIN" ]; then
            echo "Error: Compiled firmware.bin not found!"
            exit 1
          fi
          TARGET_NAME="filament-scale.bin"
          cp "$REAL_BIN" "./$TARGET_NAME"
          echo "TARGET_BIN_PATH=./$TARGET_NAME" >> $GITHUB_ENV
          echo "Prepared Binary: $TARGET_NAME"

      # ── NEW: copy .bin into installer/firmware-builds/ ──────
      - name: Copy binary to installer folder
        run: |
          cp ${{ env.TARGET_BIN_PATH }} installer/firmware-builds/filament-scale.bin

      - name: Update manifest version
        run: |
          jq --arg v "${{ env.APP_VERSION }}" '.version = $v' \
            installer/firmware-builds/manifest-scale.json > /tmp/manifest.json
          mv /tmp/manifest.json installer/firmware-builds/manifest-scale.json

      # ── Commit .bin + updated manifest back to repo ─────────
      - name: Commit firmware to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer/firmware-builds/filament-scale.bin
          git add installer/firmware-builds/manifest-scale.json
          git commit -m "ci: update firmware binaries for ${{ github.ref_name }}" || echo "Nothing to commit"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release (keeps existing behaviour) ────────────
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARGET_BIN_PATH }}
          name: "Release v${{ env.APP_VERSION }}"
          body: |
            Automatischer Build für Version ${{ env.APP_VERSION }}.
            
            **Web Installer:** https://christophcaina.github.io/filament_scale/
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}