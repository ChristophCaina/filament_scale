name: ESPHome CI

on:
  push:
    branches: [ main ]
    tags:
      - '[0-9][0-9][0-9][0-9].*'
  pull_request:
    branches: [ main ]

jobs:
  # ── Validate config on every push / PR ──────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets.yaml
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy_ssid'
          wifi_password: 'dummy_password'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          EOF

      - name: Validate ESPHome Config
        run: esphome config firmware/example_config.yaml

  # ── Build & Release on tags only ────────────────────────────
  build-release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/2')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Create secrets.yaml for build
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy'
          wifi_password: 'dummy123'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          EOF

      # ── esphome/build-action does everything automatically: ──
      #    - compiles firmware
      #    - finds firmware.factory.bin
      #    - generates manifest with MD5/SHA256
      #    - outputs folder named after the device
      - name: Build firmware
        id: esphome-build
        uses: esphome/build-action@v6
        with:
          yaml-file: firmware/example_config.yaml
          complete-manifest: true
          release-url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          release-summary: "Filament Scale ${{ github.ref_name }}"

      - name: Show build outputs
        run: |
          echo "Build name: ${{ steps.esphome-build.outputs.name }}"
          echo "Build version: ${{ steps.esphome-build.outputs.version }}"
          ls -la "${{ steps.esphome-build.outputs.name }}/"

      # ── Rename files to fixed names for the installer ────────
      - name: Prepare release assets
        run: |
          BUILD_DIR="${{ steps.esphome-build.outputs.name }}"

          # Copy and rename binary to fixed name
          cp "${BUILD_DIR}/"*.factory.bin ./filament-scale.bin

          # Fix binary path in manifest to match renamed file
          jq '.builds[0].parts[0].path = "filament-scale.bin"'             "${BUILD_DIR}/manifest.json" > ./manifest-scale.json

          echo "Release assets prepared:"
          ls -la ./filament-scale.bin ./manifest-scale.json
          echo "Manifest content:"
          cat ./manifest-scale.json

      # ── Upload as GitHub Release assets ─────────────────────
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./filament-scale.bin
            ./manifest-scale.json
          name: "Release ${{ env.APP_VERSION }}"
          body: |
            Automatischer Build für Version ${{ env.APP_VERSION }}.

            **Web Installer:** https://christophcaina.github.io/filament_scale/
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}