name: ESPHome CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets.yaml
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy_ssid'
          wifi_password: 'dummy_password'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          github_url: 'github://christophcaina/filament_scale/firmware/example_config.yaml'
          EOF

      - name: Validate ESPHome Config
        run: esphome config firmware/example_config.yaml

  build-release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome & jq
        run: |
          pip install esphome
          sudo apt-get update && sudo apt-get install jq -y

      - name: Extract Version from Tag
        run: |
          # Use the git tag as version (strip leading 'v')
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Create dummy secrets.yaml (Build)
        run: |
          cat <<EOF > firmware/secrets.yaml
          wifi_ssid: 'dummy'
          wifi_password: 'dummy123'
          spoolman_ip: '127.0.0.1'
          filaman_ip: '127.0.0.1'
          api_key: 'MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE='
          ota_password: '123'
          github_url: 'github://${{ github.repository }}/firmware/example_config.yaml'
          EOF

      - name: Compile Firmware
        run: esphome compile firmware/example_config.yaml

      - name: Find and Prepare Binary
        shell: bash
        run: |
          # ESPHome with esp-idf generates firmware.factory.bin (dot, not dash!)
          # This is the merged binary (Bootloader + Partitionstabelle + App)
          # Required for initial flashing via Web Installer (offset 0x0)
          echo "Available binaries:"
          find firmware/.esphome/build -name "*.bin" | sort

          REAL_BIN=$(find firmware/.esphome/build -name "firmware.factory.bin" | head -n 1)
          if [ -z "$REAL_BIN" ]; then
            echo "firmware.factory.bin not found, falling back to firmware.bin"
            REAL_BIN=$(find firmware/.esphome/build -name "firmware.bin" | head -n 1)
          fi
          if [ -z "$REAL_BIN" ]; then
            echo "Error: No firmware binary found!"
            exit 1
          fi
          echo "Using binary: $REAL_BIN"
          cp "$REAL_BIN" ./filament-scale.bin
          echo "TARGET_BIN_PATH=./filament-scale.bin" >> $GITHUB_ENV

      - name: Generate updated manifest
        run: |
          MD5=$(md5sum ./filament-scale.bin | cut -d' ' -f1)
          echo "Binary MD5: $MD5"
          jq \
            --arg v "${{ env.APP_VERSION }}" \
            --arg md5 "$MD5" \
            '.version = $v | .builds[0].ota.md5 = $md5' \
            installer/firmware-builds/manifest-scale.json \
            > ./manifest-scale.json
          echo "Generated manifest:"
          cat ./manifest-scale.json

      # ── Upload .bin + manifest as Release Assets ─────────────
      # No commit to main — deploy-installer.yml fetches these
      # assets directly from the release.
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./filament-scale.bin
            ./manifest-scale.json
          name: "Release v${{ env.APP_VERSION }}"
          body: |
            Automatischer Build für Version ${{ env.APP_VERSION }}.

            **Web Installer:** https://christophcaina.github.io/filament_scale/
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}