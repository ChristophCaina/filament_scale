name: Issue Auto-Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  label-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign labels based on form data
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body.toLowerCase();
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            // 1. Logik für Firmware & API
            if (body.includes('firmware') || body.includes('integration')) 
              labels.push('area: firmware');

            // 2. Logik für Hardware
            if (body.includes('hardware (3d-druck') || body.includes('mechanik')) 
              labels.push('area: hardware');

            // 3. Logik für Dokumentation & Web
            if (body.includes('dokumentation') || body.includes('web-interface') || body.includes('anleitung')) 
              labels.push('area: documentation');

            // 4. Standard-Typen absichern (falls Keywords im Titel)
            if (title.includes('bug') || body.includes('fehler')) labels.push('bug');
            if (title.includes('feature') || title.includes('wunsch')) labels.push('enhancement');
            if (title.includes('frage') || title.includes('?')) labels.push('question');

            // Dubletten entfernen und Labels setzen
            const uniqueLabels = [...new Set(labels)];
            if (uniqueLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: uniqueLabels
              });
            }