name: "Copy Labels from Referenced Issues to PR"

on:
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  copy-issue-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
    steps:
      - name: Copy labels from referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';

            // Find all referenced issue numbers
            // Matches: Fixes #123, Closes #123, Resolves #123, fix #123, etc.
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*#(\d+)/gi;
            const combined = `${title}\n${body}`;
            const matches = [...combined.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No referenced issues found in PR title or body.');
              return;
            }

            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1])))];
            console.log(`Found referenced issues: #${issueNumbers.join(', #')}`);

            // Collect all labels from referenced issues
            const labelsToAdd = new Set();

            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                issue.labels.forEach(label => labelsToAdd.add(label.name));
                console.log(`Issue #${issueNumber} labels: ${issue.labels.map(l => l.name).join(', ')}`);
              } catch (e) {
                console.log(`Could not fetch issue #${issueNumber}: ${e.message}`);
              }
            }

            if (labelsToAdd.size === 0) {
              console.log('No labels found on referenced issues.');
              return;
            }

            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labelsToAdd],
            });

            console.log(`Added labels to PR #${pr.number}: ${[...labelsToAdd].join(', ')}`);