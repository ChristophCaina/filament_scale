name: Deploy Web Installer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'installer/**'
      - '.github/workflows/deploy-installer.yml'

  # Triggered automatically after a successful build-release
  workflow_run:
    workflows: ["ESPHome CI"]
    types:
      - completed
    branches-ignore:
      - '**'   # only tag-triggered runs matter; filter below via condition

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # Run on manual/push triggers, OR when ESPHome CI completed successfully on a tag
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ── Fetch latest release assets (.bin + manifest) ────────
      - name: Download firmware assets from latest release
        run: |
          # Get the latest release tag
          RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Latest release: $TAG"

          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo "No release found — skipping firmware download."
            echo "FIRMWARE_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "FIRMWARE_AVAILABLE=true" >> $GITHUB_ENV

            # Download filament-scale.bin
            BIN_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "filament-scale.bin") | .browser_download_url')
            echo "Downloading binary from: $BIN_URL"
            curl -L -o installer/firmware-builds/filament-scale.bin "$BIN_URL"

            # Download manifest-scale.json (with updated version + MD5)
            MANIFEST_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "manifest-scale.json") | .browser_download_url')
            echo "Downloading manifest from: $MANIFEST_URL"
            curl -L -o installer/firmware-builds/manifest-scale.json "$MANIFEST_URL"

            echo "Downloaded assets for release $TAG"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload installer folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: installer/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4