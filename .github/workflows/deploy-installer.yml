name: Deploy Web Installer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy-installer.yml'

  # Triggered automatically after ESPHome CI completes
  workflow_run:
    workflows: ["ESPHome CI"]
    types:
      - completed

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ── Fetch latest release assets ──────────────────────────
      - name: Download firmware from latest release
        run: |
          RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Latest release: $TAG"

          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo "⚠️ No release found — deploying installer without firmware."
          else
            BIN_URL=$(echo "$RELEASE" | jq -r \
              '.assets[] | select(.name == "filament-scale.bin") | .browser_download_url')
            OTA_URL=$(echo "$RELEASE" | jq -r \
              '.assets[] | select(.name == "filament-scale.ota.bin") | .browser_download_url')
            MANIFEST_URL=$(echo "$RELEASE" | jq -r \
              '.assets[] | select(.name == "manifest-scale.json") | .browser_download_url')

            mkdir -p site/firmware-builds

            echo "Downloading factory binary: $BIN_URL"
            curl -L -o site/firmware-builds/filament-scale.bin "$BIN_URL"

            echo "Downloading OTA binary: $OTA_URL"
            curl -L -o site/firmware-builds/filament-scale.ota.bin "$OTA_URL"

            echo "Downloading manifest: $MANIFEST_URL"
            curl -L -o site/firmware-builds/manifest-scale.json "$MANIFEST_URL"

            echo "✅ Downloaded assets for release $TAG"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload installer as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4