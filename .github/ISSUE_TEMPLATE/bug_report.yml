name: "🐛 Bug Report / Fehler melden"
description: Report an error or bug (English / Deutsch)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### English 🇺🇸
        Thank you for reporting a bug! Please fill out the form below.
        ### Deutsch 🇩🇪
        Vielen Dank für die Fehlermeldung! Bitte fülle das Formular so gut wie möglich aus.

  - type: dropdown
    id: area
    attributes:
      label: "Affected Area / Betroffener Bereich"
      description: "Where did the issue occur? / Wo tritt das Problem auf?"
      options:
        - "Firmware (ESP32 / ESPHome)"
        - "Hardware (3D-Print / Wiring / Mechanik)"
        - "Web-Interface (Installer / PWA)"
        - "Documentation (Docs / README)"
        - "API (Spoolman / FilaMan)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description / Beschreibung"
      description: "What happened? / Was genau funktioniert nicht?"
      placeholder: "Describe the bug here... / Beschreibe den Fehler hier..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce / Schritte zur Reproduktion"
      placeholder: "1. Connected USB...\n2. Clicked Install..."
  
  - type: input
    id: esphome_version
    attributes:
      label: "ESPHome Version"
      description: "Which version are you using? (e.g., 2024.2.2) / Welche Version nutzt du?"
      placeholder: "2024.x.x"
    validations:
      required: true

  - type: dropdown
    id: board_type
    attributes:
      label: "Board / Microcontroller"
      description: "Which ESP32 are you using? / Welchen ESP32 nutzt du?"
      options:
        - "ESP32 DevKit v1"
        - "ESP32-C3"
        - "ESP32-S3"
        - "Other / Anderer"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "ESPHome Logs"
      description: "Please paste relevant log output here (if available). / Bitte relevante Log-Ausgaben hier einfügen."
      placeholder: "[12:00:01][D][sensor:092]: 'Scale Raw': Sending state..."