# ============================================================
# example_config.yaml
# Copy this file into your ESPHome dashboard.
# Only edit the substitutions below — do not add logic here.
# ============================================================

substitutions:
  # -- Device identity --
  device_name: "fila-scale"
  device_comment: "Filament Scale to communicate with Spoolman or Filaman"
  

  # -- WiFi --
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ap_password: "filament123"

  # -- ESPHome API & OTA --
  api_key: !secret api_key
  ota_password: !secret ota_password

  # -- Integration IPs --
  spoolman_ip: "192.168.0.1:7912"
  filaman_ip: "192.168.0.1:8083"

  # -- Scale calibration --
  # Run calibration procedure (see docs/calibration.md) to find your value.
  scale_calibration_factor: "420.0"

  # -- Pin assignments --
  pin_status_led:    GPIO02         # Status LED (internal)
  pin_display_clk:   GPIO18         # Ender Display -> SPI_CLK
  pin_display_mosi:  GPIO23         # Ender Display -> SPI_MOSI
  pin_display_cs:    GPIO17         # Ender Display -> CS
  pin_encoder_a:     GPIO32         # Ender Display -> ENC_A
  pin_encoder_b:     GPIO33         # Ender Display -> ENC_B
  pin_encoder_btn:   GPIO19         # Ender Display -> ENC_BTN
  pin_buzzer:        GPIO16         # Ender Display -> BUZZER
  pin_scale_dt:      GPIO21         # HX711 DOUT
  pin_scale_sck:     GPIO22         # HX711 CLK
  pin_i2c_sda:       GPIO13         # I2C SDA (NFC)
  pin_i2c_scl:       GPIO14         # I2C SCL (NFC)
  pin_stepper_step:  GPIO25         
  pin_stepper_dir:   GPIO26
  pin_filament_sens: GPIO27
  pin_speed_poti:    GPIO34
  pin_addon_detect:  GPIO05

esphome:
  name: ${device_name}
  friendly_name: "Filament Scale"
  project:
    name: ${namespace}.${esp_project}
    version: ${esp_project_version}

packages:
  base:         !include common/base.yaml
  scale:        !include common/scale.yaml
  sync:         !include common/sync.yaml       # FilaMan & SpoolMan Support
  nfc:          !include common/nfc.yaml
  stepper:      !include common/stepper.yaml
  winder:       !include common/winder.yaml  
  display:      !include common/display.yaml
  controls:     !include common/controls.yaml