# ============================================================
# base.yaml
# Base configuration: WiFi, API, OTA, Logger, LED, Buzzer,
# Project info & dashboard_import
# ============================================================
esp32:
  board: esp32dev
  framework:
    type: esp-idf

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  comment: ${device_comment}
  project:
    name: filascale.filamentspoolscale
    version: 2026.3.1  

dashboard_import:
  package_import_url: github://ChristophCaina/filament_scale/firmware/main.yaml@main
  import_full_config: false

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  id: wifi_component
  ap:
    ssid: "${device_name} Fallback"
    password: ${ap_password}

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_password}
  - platform: http_request

update:
  - platform: http_request
    name: "${device_name} Firmware Update"
    source: https://christophcaina.github.io/filament_scale/firmware-builds/manifest-scale.json

# -- Status LED --
status_led:
    id: statusled
    pin:
      number: ${pin_status_led}
      inverted: false

# -- Buzzer --
output:
  - platform: ledc
    id: buzzer_output
    pin: ${pin_buzzer}
    frequency: 2000Hz

rtttl:
  output: buzzer_output
  id: buzzer

# Convenience scripts for common beep patterns
script:
  - id: beep_short
    then:
      - rtttl.play:
          rtttl: "beep:d=4,o=5,b=200:16e6"

  - id: beep_confirm
    then:
      - rtttl.play:
          rtttl: "confirm:d=4,o=5,b=200:16e6,16e6"

  - id: beep_error
    then:
      - rtttl.play:
          rtttl: "error:d=4,o=5,b=100:16c5,16b4"