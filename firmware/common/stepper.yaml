# ============================================================
# stepper.yaml
# Stepper motor (A4988/DRV8825) + potentiometer speed control
# ============================================================

stepper:
  - platform: a4988
    id: winder_stepper
    step_pin: ${pin_stepper_step}
    dir_pin: ${pin_stepper_dir}
    max_speed: 500 steps/s
    acceleration: inf
    deceleration: inf

globals:
  - id: winder_running
    type: bool
    restore_value: false
    initial_value: "false"

