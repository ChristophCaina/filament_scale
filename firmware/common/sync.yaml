# ============================================================
# sync.yaml
# Unified sync: FilaMan (priority) or Spoolman (fallback)
#
# FilaMan exposes a fully Spoolman-compatible API under:
#   http://<filaman_ip>/spoolman/api/v1/
#
# Priority logic:
#   1. FilaMan configured (filaman_ip != "") → use FilaMan API
#      FilaMan handles internal Spoolman sync automatically.
#   2. FilaMan not configured or unreachable → use Spoolman directly
#
# Both paths use the identical Spoolman API call — only the
# base URL differs. No duplicate logic needed.
# ============================================================

http_request:
  useragent: "ESPHome Filament Scale"
  timeout: 5s

globals:
  - id: spoolman_spool_id
    type: int
    restore_value: true
    initial_value: "1"

  # Tracks which backend is active (set on boot by script_detect_backend)
  - id: sync_use_filaman
    type: bool
    restore_value: false
    initial_value: "false"

  - id: sync_backend_url
    type: std::string
    restore_value: false
    initial_value: '""'

