# ============================================================
# filaman.yaml
# FilaMan HTTP integration: push weight after stable reading
# ============================================================

# Note: http_request is already declared in spoolman.yaml.
# If filaman.yaml is used WITHOUT spoolman.yaml, uncomment:
# http_request:
#   useragent: "ESPHome Filament Scale"
#   timeout: 5s

button:
  - platform: template
    id: btn_sync_filaman
    name: "${device_name} Sync FilaMan"
    icon: mdi:cloud-upload-outline
    on_press:
      then:
        - script.execute: script_push_filaman