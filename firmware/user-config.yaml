# ============================================================
# user-config.yaml (example / template)
# This is what the user's LOCAL ESPHome config looks like
# after "Take Control" in the ESPHome Dashboard.
#
# api, wifi, ota and the encryption key live HERE —
# not on GitHub — so they survive OTA updates.
#
# The actual firmware functionality comes from the
# filament-scale.yaml package on GitHub.
# ============================================================

substitutions:
  device_name: "fila-scale"
  friendly_name: "Filament Scale"
  device_comment: "Filament Scale — Spoolman & FilaMan integration"

  # -- Integration IPs --
  # Leave empty to configure via Home Assistant UI
  # Set here to have it persist across OTA updates (Power User)
  spoolman_ip: ""
  filaman_ip: ""

  # -- Scale calibration --
  # Leave empty to configure via Home Assistant UI
  # Set here to have it persist across OTA updates (Power User)
  scale_calibration_factor: ""

  # -- Pin assignments (default: Ender3/Ender5 display + ESP32 DevKit) --
  # Only change if your hardware differs from the default wiring
  pin_status_led:    GPIO02   # Status LED (built-in on most boards)
  pin_display_clk:   GPIO18   # ST7920 CLK (Ender display EXP1)
  pin_display_mosi:  GPIO23   # ST7920 MOSI
  pin_display_cs:    GPIO17   # ST7920 CS
  pin_encoder_a:     GPIO32   # Rotary encoder A
  pin_encoder_b:     GPIO33   # Rotary encoder B
  pin_encoder_btn:   GPIO19   # Rotary encoder button
  pin_buzzer:        GPIO16   # Buzzer
  pin_scale_dt:      GPIO21   # HX711 DOUT
  pin_scale_sck:     GPIO22   # HX711 CLK
  pin_i2c_sda:       GPIO13   # I2C SDA (NFC)
  pin_i2c_scl:       GPIO14   # I2C SCL (NFC)
  pin_stepper_step:  GPIO25   # Stepper STEP (winder add-on)
  pin_stepper_dir:   GPIO26   # Stepper DIR (winder add-on)
  pin_filament_sens: GPIO27   # Filament runout sensor
  pin_speed_poti:    GPIO34   # Potentiometer (winder speed)
  pin_addon_detect:  GPIO05   # Winder add-on detection

# Core firmware package from GitHub
# Updates here = new features, bug fixes
# Your api key, wifi and substitutions are NOT affected by updates
packages:
  filament_scale: github://ChristophCaina/filament_scale/firmware/filament-scale.yaml@main

# API encryption key — generated by ESPHome on Take Control
# This key allows ESPHome Dashboard and HA to connect securely
api:
  encryption:
    key: ""  # ESPHome generates this automatically

# WiFi credentials — stored locally, never on GitHub
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: "filament123"

captive_portal:

# OTA — ESPHome Dashboard updates compile this local config
# and flash via OTA, preserving your key and substitutions
ota:
  - platform: esphome