# ============================================================
# main.yaml
# Main configuration file — used for both:
#   - Web Installer (compiled firmware)
#   - ESPHome Dashboard Import ("Take Control")
#
# After "Take Control", adjust the substitutions below to
# match your hardware (pins, WiFi, IPs, calibration).
# ============================================================

substitutions:
  # -- Device identity --
  device_name: "fila-scale"
  device_friendly_name: "Filament Scale"
  device_comment: "Filament Scale — Spoolman & FilaMan integration"

  # -- ESPHome API & OTA --
  # After Take Control: ESPHome will auto-generate these.
  # Replace with !secret api_key / !secret ota_password
  api_key: ""
  ota_password: ""

  # -- Integration IPs --
  # Set to your Spoolman / FilaMan instance IP:port
  spoolman_ip: ""
  filaman_ip: ""

  # -- Scale calibration --
  # See docs/calibration.md for how to find your value
  scale_calibration_factor: "420.0"

  # -- Pin assignments (default: Ender3/Ender5 display + ESP32 DevKit) --
  pin_status_led:    GPIO02   # Status LED (built-in on most boards)
  pin_display_clk:   GPIO18   # ST7920 CLK (Ender display EXP1)
  pin_display_mosi:  GPIO23   # ST7920 MOSI
  pin_display_cs:    GPIO17   # ST7920 CS
  pin_encoder_a:     GPIO32   # Rotary encoder A
  pin_encoder_b:     GPIO33   # Rotary encoder B
  pin_encoder_btn:   GPIO19   # Rotary encoder button
  pin_buzzer:        GPIO16   # Buzzer
  pin_scale_dt:      GPIO21   # HX711 DOUT
  pin_scale_sck:     GPIO22   # HX711 CLK
  pin_i2c_sda:       GPIO13   # I2C SDA (NFC)
  pin_i2c_scl:       GPIO14   # I2C SCL (NFC)
  pin_stepper_step:  GPIO25   # Stepper STEP (winder add-on)
  pin_stepper_dir:   GPIO26   # Stepper DIR (winder add-on)
  pin_filament_sens: GPIO27   # Filament runout sensor
  pin_speed_poti:    GPIO34   # Potentiometer (winder speed)
  pin_addon_detect:  GPIO05   # Winder add-on detection

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_comment}
  name_add_mac_suffix: false
  min_version: "2024.6.0"
  project:
    name: filascale.filamentspoolscale
    version: "2026.3.1"
 
esp32:
  board: esp32dev
  framework:
    type: esp-idf
 
# -- WiFi: no credentials — configured via Improv or Captive Portal --
wifi:
  ap:
    ssid: "${name} Fallback"
    password: "filament123"
 
# Allow provisioning WiFi via serial (used by ESP Web Tools after flash)
improv_serial:
 
# Allow provisioning WiFi via Bluetooth LE
esp32_improv:
  authorizer: none
 
# Fallback: connect to AP and configure via browser
captive_portal:
 
logger:
 
api:
 
ota:
  - platform: esphome
 
dashboard_import:
  package_import_url: github://ChristophCaina/filament_scale/firmware/main.yaml@main
  import_full_config: false
 
http_request:
  verify_ssl: false
 
update:
  - platform: http_request
    name: "${name} Firmware Update"
    source: https://christophcaina.github.io/filament_scale/firmware-builds/manifest-scale.json

packages:
  base:     github://ChristophCaina/filament_scale/firmware/common/base.yaml@main
  scale:    github://ChristophCaina/filament_scale/firmware/common/scale.yaml@main
  display:  github://ChristophCaina/filament_scale/firmware/common/display.yaml@main
  controls: github://ChristophCaina/filament_scale/firmware/common/controls.yaml@main
  stepper:  github://ChristophCaina/filament_scale/firmware/common/stepper.yaml@main
  winder:   github://ChristophCaina/filament_scale/firmware/common/winder.yaml@main
  sync:     github://ChristophCaina/filament_scale/firmware/common/sync.yaml@main
  nfc:      github://ChristophCaina/filament_scale/firmware/common/nfc.yaml@main